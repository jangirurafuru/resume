<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta content="width=device-width, initial-scale=1.0" name="viewport">
  <title>Project Details - Baki</title>
  
  <!-- Favicons -->
  <link href="assets/img/shuriken_favicon.png" rel="icon">
  <link href="assets/img/shuriken_favicon.png" rel="apple-touch-icon">

  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Shojumaru&display=swap" rel="stylesheet">
  
  <style>
    body {
      margin: 0;
      padding: 0;
      background-color: #0a0a0a;
      background-image: url('assets/img/baki_bg.png');
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
      height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      position: relative;
    }
    .overlay {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.7);
      background: linear-gradient(to top, rgba(0,0,0,0.9), rgba(0,0,0,0.4));
      z-index: 1;
    }
    .content {
      position: relative;
      z-index: 2;
      text-align: center;
      padding: 2rem;
      animation: fadeIn 1s ease-out forwards;
    }
    .title {
      font-family: 'Shojumaru', cursive;
      color: #f97316; /* Tailwind orange-500 */
      text-shadow: 0 0 30px rgba(249, 115, 22, 1);
      line-height: 1.2;
    }
    .subtitle {
      color: #e5e5e5;
      font-family: sans-serif;
      margin-top: 1rem;
      font-size: 1.2rem;
      letter-spacing: 2px;
    }
    .back-link {
      display: inline-block;
      margin-top: 3rem;
      padding: 1rem 2.5rem;
      background-color: #f97316;
      color: white;
      font-family: sans-serif;
      font-weight: bold;
      border-radius: 9999px;
      text-decoration: none;
      transition: all 0.3s ease;
      text-transform: uppercase;
      letter-spacing: 1px;
    }
    .back-link:hover {
      background-color: #ea580c;
      transform: scale(1.05);
      box-shadow: 0 0 20px rgba(249, 115, 22, 0.6);
    }
    
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>
  <div class="overlay"></div>
  <div class="content">
    <h1 class="title text-5xl md:text-7xl lg:text-8xl tracking-wider">WILL SHOW IN<br>INTERVIEW</h1>
    <p class="subtitle">PROJECT DETAILS ARE CLASSIFIED</p>
    <a href="index.html" class="back-link">BACK TO PORTFOLIO</a>
  </div>
</body>
</html>
